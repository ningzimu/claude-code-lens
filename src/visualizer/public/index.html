        block.appendChild(title);
        block.appendChild(codeBlock(pretty(state.toolDefs[key]?.input_schema || state.toolDefs[key] || {})));
        wrap.appendChild(block);
      });

      if (keys.length >= 2) {
        const diffTitle = document.createElement('div');
        diffTitle.className = 'section-title';
        diffTitle.textContent = 'Diff: Version 1 -> Version 2';
        wrap.appendChild(diffTitle);

        const diff = document.createElement('pre');
        diff.className = 'diff-block';
        const from = pretty(state.toolDefs[keys[0]]?.input_schema || state.toolDefs[keys[0]] || {});
        const to = pretty(state.toolDefs[keys[1]]?.input_schema || state.toolDefs[keys[1]] || {});
        lineDiff(from, to).forEach(line => {
          const span = document.createElement('span');
          span.className = `diff-line diff-${line.type}`;
          span.textContent = line.text;
          diff.appendChild(span);
        });
        wrap.appendChild(diff);
      }

      openModal(`Schema versions: ${name}`, wrap);
    }

    // -------- Aggregation logic --------
    function collectSystemPromptIds(data) {
      const ids = new Set();
      const prompts = data.prompts || {};
      const SENTINEL = '<system-reminder>';

      // 1) Prompts explicitly referenced in input.system
      (data.conversations || []).forEach(c => {
        const sys = c.input && c.input.system;
        if (Array.isArray(sys)) {
          sys.forEach(seg => {
            if (typeof seg === 'string' && isPromptId(seg)) ids.add(seg.trim());
            else if (seg && typeof seg === 'object' && seg.type === 'text' && isPromptId(seg.text)) ids.add(seg.text.trim());
          });
        }
      });

      // 2) User messages: ONLY those whose resolved text starts with <system-reminder>
      const counts = new Map(); // count sentinel-matched prompts
      (data.conversations || []).forEach(c => {
        const msgs = (c.input && Array.isArray(c.input.messages)) ? c.input.messages : [];
        msgs.forEach(m => {
          if (m.role !== 'user') return;
          const addIfSentinel = (pid) => {
            const txt = prompts?.[pid];
            if (typeof txt === 'string' && txt.trim().startsWith(SENTINEL)) {
              ids.add(pid);
              counts.set(pid, (counts.get(pid) || 0) + 1);
            }
          };
          const content = m.content;
          if (typeof content === 'string') {
            if (isPromptId(content)) addIfSentinel(content.trim());
          } else if (Array.isArray(content)) {
            content.forEach(seg => {
              if (seg?.type === 'text' && isPromptId(seg.text)) addIfSentinel(seg.text.trim());
            });
          }
        });
      });
      state.extraPromptCounts = Object.fromEntries(counts);

      // 3) prompt_kind_guess marked as system
      const guess = data.prompt_kind_guess || {};
      Object.entries(guess).forEach(([pid, kind]) => {
        const k = (kind || '').toString().toLowerCase();
        if (k.includes('system')) ids.add(pid);
      });

      return ids;
    }

    function buildMaps(data) {
      state.promptMap = data.prompts || {};
      state.promptCounts = data.prompt_counts || {};
      state.toolDefs = data.tool_defs || {};
      state.toolKeysByName = new Map();
      Object.entries(state.toolDefs).forEach(([k, def]) => {
        const name = (def && def.name) || k;
        const arr = state.toolKeysByName.get(name) || [];
        arr.push(k);
        state.toolKeysByName.set(name, arr);
      });
      state.systemPromptIds = collectSystemPromptIds(data);
    }

    function emptyLeadSubagentView(reason = 'not-loaded') {
      return {
        nativeTrace: {
          found: false,
          reason
        },
        agents: [],
        assignments: {},
        stats: {
          totalRequests: 0,
          highConfidence: 0,
          lowConfidence: 0,
          unmatched: 0
        }
      };
    }

    function remoteLogName(url) {
      if (typeof url !== 'string' || !url.startsWith('/logs/')) return null;
      return url.split('/').pop() || null;
    }

    async function fetchLeadSubagentView(url) {
      const logName = remoteLogName(url);
      if (!logName) return emptyLeadSubagentView('local-file');

      try {
        const response = await fetch(`/api/lead-subagent-view?log=${encodeURIComponent(logName)}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        console.warn('[Visualizer] Failed to load lead/subagent view:', err);
        return emptyLeadSubagentView('api-error');
      }
    }

    function applyLeadSubagentView(data, view) {
      state.leadSubagentView = view || emptyLeadSubagentView('empty');
      const assignments = state.leadSubagentView.assignments || {};

      (data?.conversations || []).forEach(conv => {
        const assignment = assignments[conv.uid];
        conv.agentId = assignment?.agentId || 'unmatched';
        conv.agentName = assignment?.agentName || 'Unmatched';
        conv.agentRole = assignment?.agentRole || 'unmatched';
        conv.agentConfidence = assignment?.confidence || 'unmatched';
        conv.agentMatchReason = assignment?.matchReason || 'not-attributed';
      });
    }

    function conversationsForCurrentFilter() {
      const conversations = state.data?.conversations || [];
      if (state.agentFilter === 'all') return conversations;
      if (state.agentFilter === 'lead') {
        return conversations.filter(conv => conv.agentRole === 'lead');
      }
      if (state.agentFilter === 'unmatched') {
        return conversations.filter(conv => conv.agentRole === 'unmatched' || !conv.agentId);
      }
      if (state.agentFilter?.startsWith('agent:')) {
        const agentId = state.agentFilter.slice('agent:'.length);
        return conversations.filter(conv => conv.agentId === agentId);
      }
      return conversations;
    }

    function countForFilter(value) {
      const previous = state.agentFilter;
      state.agentFilter = value;
      const count = conversationsForCurrentFilter().length;
      state.agentFilter = previous;
      return count;
    }

    function renderLeadSubagentFilter() {
      if (!agentRailList) return;
      const previous = state.agentFilter || 'all';
      const view = state.leadSubagentView || emptyLeadSubagentView('empty');
      const agents = Array.isArray(view.agents) ? view.agents : [];
      const options = [{
        value: 'all',
        label: 'All',
        role: 'all',
        count: countForFilter('all'),
        tooltip: `All agents\nrequests: ${countForFilter('all')}`
      }];

      if (agents.some(agent => agent.role === 'lead')) {
        options.push({
          value: 'lead',
          label: 'Lead',
          role: 'lead',
          count: countForFilter('lead'),
          tooltip: `description: Lead agent\nsubagent_type: n/a\nrequests: ${countForFilter('lead')}`
        });
      }

      agents
        .filter(agent => agent.role === 'subagent')
        .forEach((agent, index) => {
          const value = `agent:${agent.id}`;
          const count = countForFilter(value);
          const description = agent.description || agent.name || agent.id;
          const subagentType = agent.subagentType || '(unknown)';
          options.push({
            value,
            label: `S${index + 1}`,
            role: 'subagent',
            count,
            tooltip: `description: ${description}\nsubagent_type: ${subagentType}\nagentId: ${agent.id}\nrequests: ${count}`
          });
        });

      const unmatchedCount = countForFilter('unmatched');
      if (unmatchedCount > 0 || view.nativeTrace?.found) {
        options.push({
          value: 'unmatched',
          label: 'U',
          role: 'unmatched',
          count: unmatchedCount,
          tooltip: `description: Unmatched requests\nsubagent_type: n/a\nrequests: ${unmatchedCount}`
        });
      }

      agentRailList.innerHTML = '';
      function agentRailIcon(role) {
        if (role === 'lead') {
          return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>';
        }
        if (role === 'subagent') {
          return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="7" r="3"/><circle cx="18" cy="7" r="3"/><circle cx="12" cy="17" r="3"/><path d="M8.5 9.2 11 14"/><path d="M15.5 9.2 13 14"/></svg>';
        }
        if (role === 'unmatched') {
          return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.2 9a3 3 0 1 1 5.4 1.8c-1.7 1.1-2.6 1.9-2.6 3.2"/><path d="M12 18h.01"/></svg>';
        }
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>';
      }
      options.forEach(option => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `rail-btn agent-rail-btn agent-role-${option.role}`;
        button.dataset.agentFilter = option.value;
        button.dataset.empty = option.count === 0 ? 'true' : 'false';
        button.classList.toggle('active', option.value === previous);
        button.setAttribute('aria-label', option.tooltip.replace(/\n/g, '; '));
        button.title = option.tooltip;
        const label = document.createElement('span');
        label.className = 'agent-rail-label';
        label.innerHTML = agentRailIcon(option.role);
        const count = document.createElement('span');
        count.className = 'rail-count';
        count.textContent = String(option.count);
        const tooltip = document.createElement('span');
        tooltip.className = 'rail-tooltip';
        tooltip.textContent = option.tooltip;
        button.appendChild(label);
        button.appendChild(count);
        button.appendChild(tooltip);
        button.addEventListener('click', () => {
          state.agentFilter = option.value;
          renderLeadSubagentFilter();
          setIndex(0);
        });
        agentRailList.appendChild(button);
      });

      state.agentFilter = options.some(option => option.value === previous) ? previous : 'all';
      agentRailList.querySelectorAll('[data-agent-filter]').forEach(button => {
        button.classList.toggle('active', button.dataset.agentFilter === state.agentFilter);
        button.disabled = !state.data || options.length <= 1;
      });
    }

    function agentBadge(conv) {
      const role = conv.agentRole || 'unmatched';
      const confidence = conv.agentConfidence || 'unmatched';
      const label = role === 'lead'
        ? 'Lead'
        : role === 'subagent'
          ? `Subagent:${conv.agentName || conv.agentId}`
          : 'Unmatched';
      const badge = pill(`${label} · ${confidence}`, conv.agentMatchReason || '', null, `badge agent-badge agent-role-${role} agent-confidence-${confidence}`);
      badge.removeAttribute('href');
      return badge;
    }

    // -------- Resource panel --------
    toolsToggle.addEventListener('click', () => setResourceView('tools'));

    // -------- Rendering: top cards --------
    function renderToolEntry(groupName, keys) {
      const key = keys[0];
      const def = state.toolDefs[key];
      const mcp = parseMcpTool(groupName);
      const name = mcp ? mcp.displayTool : (toolDisplayName(key, def) || groupName);
      const d = document.createElement('details');
      d.setAttribute('data-resource-item', '');
      d.setAttribute('data-tool-key', key);
      const s = document.createElement('summary');
      const left = document.createElement('span');
      left.className = 'summary-title';
      const versionLabel = keys.length > 1 ? `${keys.length} versions` : '';
      left.innerHTML = `
        <span class="summary-main">
          <span class="summary-name">${name}</span>
          ${versionLabel ? `<span class="summary-sub">${versionLabel}</span>` : ''}
        </span>
      `;
      s.appendChild(left);
      d.appendChild(s);

      const body = document.createElement('div');
      body.style.padding = '12px 14px 14px';

      const tabs = document.createElement('div');
      tabs.className = 'variant-tabs';
      const desc = document.createElement('div');
      desc.className = 'small';
      const meta = document.createElement('div');
      meta.className = 'chips';
      meta.style.marginTop = '10px';
      const schema = document.createElement('div');

      function renderVariant(index) {
        const activeKey = keys[index];
        const activeDef = state.toolDefs[activeKey] || {};
        Array.from(tabs.children).forEach((tab, tabIndex) => {
          tab.classList.toggle('active', tabIndex === index);
        });
        desc.textContent = activeDef.description || '(no description)';
        meta.innerHTML = '';
        if (keys.length > 1) {
          const compare = document.createElement('button');
          compare.type = 'button';
          compare.className = 'compare-btn';
          compare.textContent = 'Schema diff';
          compare.onclick = (event) => {
            event.preventDefault();
            event.stopPropagation();
            openToolDiffModal(name, keys);
          };
          meta.appendChild(compare);
        }
        schema.innerHTML = '';
        schema.appendChild(codeBlock(pretty(activeDef.input_schema || {})));
      }

      if (keys.length > 1) {
        keys.forEach((variantKey, index) => {
          const tab = document.createElement('button');
          tab.type = 'button';
          tab.className = 'variant-tab';
          tab.textContent = `v${index + 1}`;
          tab.title = variantKey;
          tab.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            renderVariant(index);
          });
          tabs.appendChild(tab);
        });
        body.appendChild(tabs);
      }

      body.appendChild(desc);
      body.appendChild(meta);
      const div = document.createElement('div'); div.className = 'divider'; body.appendChild(div);
      body.appendChild(schema);
      d.appendChild(body);
      renderVariant(0);
      return d;
    }

    function renderTools() {
      toolsList.innerHTML = '';
      const defs = state.toolDefs;
      if (!defs || !Object.keys(defs).length) {
        toolsList.innerHTML = '<div class="muted">No tool definitions</div>';
        return;
      }
      const grouped = Array.from(state.toolKeysByName.entries())
        .sort(([a], [b]) => a.localeCompare(b));

      const regular = [];
      const mcpGroups = new Map();
      grouped.forEach(([groupName, keys]) => {
        const mcp = parseMcpTool(groupName);
        if (!mcp) {
          regular.push([groupName, keys]);
          return;
        }
        const bucket = mcpGroups.get(mcp.rawServer) || { meta: mcp, entries: [] };
        bucket.entries.push([groupName, keys]);
        mcpGroups.set(mcp.rawServer, bucket);
      });

      regular.forEach(([groupName, keys]) => {
        toolsList.appendChild(renderToolEntry(groupName, keys));
      });

      Array.from(mcpGroups.values())
        .sort((a, b) => a.meta.displayServer.localeCompare(b.meta.displayServer))
        .forEach(group => {
          const d = document.createElement('details');
          d.className = 'mcp-group';
          d.setAttribute('data-resource-item', '');
          const s = document.createElement('summary');
          const left = document.createElement('span');
          left.className = 'summary-title';
          left.innerHTML = `
            <span class="summary-main">
              <span class="summary-name">MCP · ${displayMcpServerName(group.meta.displayServer)}</span>
              <span class="summary-sub">${group.entries.length} tools</span>
            </span>
          `;
          s.appendChild(left);
          d.appendChild(s);

          const body = document.createElement('div');
          body.className = 'mcp-group-body';
          group.entries
            .sort(([a], [b]) => {
              const am = parseMcpTool(a)?.displayTool || a;
              const bm = parseMcpTool(b)?.displayTool || b;
              return am.localeCompare(bm);
            })
            .forEach(([groupName, keys]) => body.appendChild(renderToolEntry(groupName, keys)));
          d.appendChild(body);
          toolsList.appendChild(d);
        });
    }

    function renderSystemPrompts() {
      systemList.innerHTML = '';
      const ids = Array.from(state.systemPromptIds)
        .sort((a, b) => {
          const diff = promptCount(b) - promptCount(a);
          return diff || a.localeCompare(b, undefined, { numeric: true });
        });
      if (!ids.length) {
        systemList.innerHTML = '<div class="muted">No system prompts detected</div>';
        return;
      }
      ids.forEach(pid => {
        const txt = state.promptMap?.[pid] ?? '(not found in prompts)';
        const card = document.createElement('div');
        card.className = 'resource-preview-card';
        card.setAttribute('data-resource-item', '');
        card.setAttribute('data-prompt-id', pid);
        card.setAttribute('role', 'button');
        card.tabIndex = 0;

        const head = document.createElement('div');
        head.className = 'resource-preview-head';
        const title = document.createElement('div');
        title.className = 'resource-preview-title';
        title.innerHTML = `<span class="mono hl">${pid}</span>`;
        const count = document.createElement('span');
        count.className = 'badge';
        count.textContent = `count: ${promptCount(pid)}`;
        head.appendChild(title);
        head.appendChild(count);
        card.appendChild(head);

        const preview = document.createElement('div');
        preview.className = 'resource-preview-body';
        preview.textContent = previewText(txt);
        card.appendChild(preview);

        const open = () => {
          const wrap = document.createElement('div');
          const meta = document.createElement('div');
          meta.className = 'chips';
          const idBadge = document.createElement('span');
          idBadge.className = 'badge';
          idBadge.textContent = pid;
          const countBadge = document.createElement('span');
          countBadge.className = 'badge';
          countBadge.textContent = `count: ${promptCount(pid)}`;
          meta.appendChild(idBadge);
          meta.appendChild(countBadge);
          wrap.appendChild(meta);
          const bubble = document.createElement('div');
          bubble.className = 'bubble small';
          bubble.style.marginTop = '12px';
          bubble.appendChild(mdBlock(txt));
          wrap.appendChild(bubble);
          openModal(`Prompt ${pid}`, wrap);
        };
        card.addEventListener('click', open);
        card.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            open();
          }
        });

        systemList.appendChild(card);
      });
    }

    function renderResources() {
      renderTools();
      renderSystemPrompts();
      updateResourceCounts();
      filterResources();
    }

    // -------- Mapping helpers --------
    function mapToolRefByName(name) {
      if (!name) return null;
      const keys = state.toolKeysByName.get(name) || [];
      if (keys.length) return keys[0]; // pick first
      if (state.toolDefs[name]) return name;
      return null;
    }
    function mapToolRef(ref) {
      if (!ref) return null;
      if (state.toolDefs[ref.key]) return ref.key;
      return mapToolRefByName(ref.name) || ref.key;
    }
    function promptRefPill(pid, cacheControl) {
      let label = `[${pid}]`;
      let title = 'View prompt content';
      
      // Add cache control indicator inside the pill
      if (cacheControl) {
        label += ` ♻️`;
        title += ` | Cache: ${cacheControl.type || 'cached'}`;
      }
      
      return pill(label, title, () => {
        const wrap = document.createElement('div');
        const txt = state.promptMap?.[pid] ?? '(not found in prompts)';
        wrap.appendChild(mdBlock(txt));
        
        // Show cache control info in modal if present
        if (cacheControl) {
          const cacheInfo = document.createElement('div');
          cacheInfo.style.marginTop = '12px';
          cacheInfo.style.padding = '8px';
          cacheInfo.style.background = 'rgba(122, 162, 255, 0.1)';
          cacheInfo.style.borderRadius = '6px';
          cacheInfo.style.fontSize = '0.85rem';
          cacheInfo.innerHTML = `<strong>♻️ Cache Control:</strong> ${JSON.stringify(cacheControl, null, 2)}`;
          wrap.appendChild(cacheInfo);
        }
        
        openModal(`Prompt ${pid}`, wrap);
      });
    }
    function toolRefPill(nameOrKey, input) {
      const ref = splitToolRef(nameOrKey);
      const key = mapToolRef(ref);
      const def = state.toolDefs?.[key];
      const name = toolDisplayName(key, def) || ref.name;
      const variant = toolVersionLabel(name, key);
      const label = ref.invocationId ? `${name} @ ${ref.invocationId}` : name;
      const title = [
        'View tool definition',
        variant,
        key ? `Internal id: ${key}` : ''
      ].filter(Boolean).join(' · ');
      return pill(label, title, () => {
        const wrap = document.createElement('div');
        if (input) {
          wrap.appendChild(codeBlock(pretty(input)));
        }
        wrap.appendChild(codeBlock(pretty(def ?? `Tool not found: ${nameOrKey}`)));
        openModal(`Tool ${label}`, wrap);
      }, 'tool-pill');
    }
    function toolResultPill(tr) {
      const label = tr?.tool_use_id ? `ToolResult @ ${tr.tool_use_id}` : 'ToolResult';
      return pill(`[${label}]`, 'View tool_result payload', () => {
        const wrap = document.createElement('div');
        let content = ''
        if (typeof tr.content === 'string') {
          content = tr.content;
        } else if (Array.isArray(tr.content)) {
          content = tr.content.map(seg => seg?.text ?? '').join('\n');
        } else {
          content = pretty(tr.content);
        }
        wrap.appendChild(codeBlock(content));
        openModal(label, wrap);
      });
    }

    // -------- Message rendering --------
    function messageTextBlock(role, text, cacheControl) {
      const b = document.createElement('div');
      b.className = role === 'assistant' ? 'response-block' : 'bubble small';
      b.appendChild(mdBlock(text));
      if (cacheControl) {
        const cacheBadge = document.createElement('span');
        cacheBadge.className = 'badge';
        cacheBadge.textContent = `♻️ ${cacheControl.type || 'cached'}`;
        cacheBadge.style.marginLeft = '8px';
        cacheBadge.title = `Cache Control: ${JSON.stringify(cacheControl)}`;
        b.appendChild(cacheBadge);
      }
      return b;
    }

    function messageRoleLabel(role) {
      return role === 'user' ? 'human' : role;
    }

    function renderMessageContent(msg) {
      const role = msg.role || '(role?)';
      const contentBox = document.createElement('div'); contentBox.className = 'small message-content';
      const content = msg.content;

      // string content
      if (typeof content === 'string') {
        if (isPromptId(content)) {
          if (role !== 'user' || state.systemPromptIds.has(content)) {
            contentBox.appendChild(promptRefPill(content));
          } else {
            const txt = state.promptMap?.[content] ?? content;
            contentBox.appendChild(messageTextBlock(role, txt));
          }
        } else {
          contentBox.appendChild(messageTextBlock(role, content));
        }
      }
      // array content
      else if (Array.isArray(content)) {
        content.forEach(seg => {
          if (seg?.type === 'text') {
            const t = seg.text ?? '';
            if (isPromptId(t)) {
              if (role !== 'user' || state.systemPromptIds.has(t)) {
                // Pass cache_control to promptRefPill
                contentBox.appendChild(promptRefPill(t, seg.cache_control));
              } else {
                const txt = state.promptMap?.[t] ?? t;
                contentBox.appendChild(messageTextBlock(role, txt, seg.cache_control));
              }
            } else {
              contentBox.appendChild(messageTextBlock(role, t, seg.cache_control));
            }
          } else if (seg?.type === 'tool_use') {
            let nm = seg.name || 'tool';
            if (seg.id) {
              nm += ` @ ${seg.id}`;
            }
            contentBox.appendChild(toolRefPill(nm, seg.input));
          } else if (seg?.type === 'tool_result') {
            contentBox.appendChild(toolResultPill(seg));
          } else if (seg?.type === 'thinking') {
            const b = document.createElement('div'); b.className = 'thinking-block'; b.appendChild(mdBlock(seg.thinking || ''));
            contentBox.appendChild(b);
          } else {
            const code = document.createElement('code');
            code.textContent = pretty(seg);
            contentBox.appendChild(code);
          }
        });
      }
      else if (content == null && msg.text) {
        contentBox.appendChild(messageTextBlock(role, msg.text));
      } else {
        contentBox.appendChild(codeBlock(pretty(content)));
      }

      if (role === 'assistant' && !contentBox.querySelector('.bubble, .thinking-block, .response-block, pre')) {
        contentBox.classList.add('assistant-inline-content');
      }

      return contentBox;
    }

    function renderMessageMeta(msg) {
      const role = msg.role || '(role?)';
      const meta = document.createElement('div');
      meta.className = 'message-row-meta';
      const r = document.createElement('span'); r.className = 'tag'; r.textContent = messageRoleLabel(role);
      meta.appendChild(r);
      if (msg.cache_control?.type === 'ephemeral' || msg.cache_control === 'ephemeral') {
        const ep = document.createElement('span'); ep.className = 'tag'; ep.textContent = 'ephemeral';
        meta.appendChild(ep);
      }
      return meta;
    }

    function renderMessageItem(msg) {
      const role = msg.role || '(role?)';
      const row = document.createElement('div');
      row.className = `message-row message-row-${role}`;
      row.appendChild(renderMessageMeta(msg));

      const body = document.createElement('div');
      body.className = 'message-row-content';
      body.appendChild(renderMessageContent(msg));
      row.appendChild(body);
      return row;
    }

    function groupMessagesIntoTurns(messages) {
      const turns = [];
      let current = null;
      messages.forEach(message => {
        const role = message?.role || '';
        if (!current || role === 'user') {
          current = [];
          turns.push(current);
        }
        current.push(message);
      });
      return turns;
    }

    function renderTreeGroup(titleText, subText, children, className = '') {
      const group = document.createElement('details');
      group.className = `message-tree-group ${className}`.trim();
      group.open = true;

      const summary = document.createElement('summary');
      const title = document.createElement('span');
      title.className = 'tree-title';
      const main = document.createElement('span');
      main.textContent = titleText;
      title.appendChild(main);
      if (subText) {
        const sub = document.createElement('span');
        sub.className = 'tree-sub';
        sub.textContent = subText;
        title.appendChild(sub);
      }
      summary.appendChild(title);
      group.appendChild(summary);

      const body = document.createElement('div');
      body.className = 'tree-children';
      children.forEach(child => body.appendChild(child));
      group.appendChild(body);
      return group;
    }

    function renderCurrentRequestItem(message) {
      const wrapper = document.createElement('div');
      wrapper.className = 'current-request-card';
      wrapper.appendChild(renderMessageMeta(message));
      wrapper.appendChild(renderMessageContent(message));
      return wrapper;
    }

    function renderMessageTree(messages) {
      const tree = document.createElement('div');
      tree.className = 'message-tree';

      const turns = groupMessagesIntoTurns(messages);
      const historyTurns = turns.slice(0, -1);
      const currentTurn = turns[turns.length - 1] || [];

      if (currentTurn.length) {
        const currentHuman = [...currentTurn].reverse().find(message => message?.role === 'user') || currentTurn[0];
        tree.appendChild(renderCurrentRequestItem(currentHuman));
      }

      if (historyTurns.length) {
        const historyMessages = historyTurns.flat();
        const historyChildren = historyMessages.map(message => renderMessageItem(message));
        tree.appendChild(renderTreeGroup('History', `${historyTurns.length} turns`, historyChildren, 'history-group'));
      }

      return tree;
    }

    const outputHeader = el('outputHeader'); // New ref

    // -------- Output helpers --------
    /**
     * Extract thinking and text content separately from response data
     * @returns {{ thinking: string[], texts: string[] }}
     */
    function extractContentParts(data) {
      const result = { thinking: [], texts: [] };
      
      if (Array.isArray(data?.content)) {
        for (const block of data.content) {
          if (!block) continue;
          if (block.type === 'thinking' && block.thinking) {
            result.thinking.push(block.thinking);
          } else if (block.type === 'text' && block.text) {
            result.texts.push(block.text);
          }
        }
      } else if (data?.text) {
        // Handle legacy format or already-processed text
        // Check if text contains [thinking] markers (from parser normalization)
        const text = data.text;
        const thinkingRegex = /\[thinking\]\n?([\s\S]*?)\n?\[\/thinking\]\n?/g;
        let lastIndex = 0;
        let match;
        
        while ((match = thinkingRegex.exec(text)) !== null) {
          // Add text before this thinking block
          if (match.index > lastIndex) {
            const beforeText = text.slice(lastIndex, match.index).trim();
            if (beforeText) result.texts.push(beforeText);
          }
          // Add thinking content
          result.thinking.push(match[1].trim());
          lastIndex = match.index + match[0].length;
        }
        
        // Add remaining text after last thinking block
        if (lastIndex < text.length) {
          const afterText = text.slice(lastIndex).trim();
          if (afterText) result.texts.push(afterText);
        }
        
        // If no thinking markers found, just use the text as-is
        if (result.thinking.length === 0 && result.texts.length === 0 && text.trim()) {
          result.texts.push(text);
        }
      }
      
      return result;
    }

    // -------- Panels --------
    function renderInput(conv) {
      inputPanel.innerHTML = '';
      const input = conv.input || {};

      // Header meta tags (Model, Tokens, etc.)
      convHeader.innerHTML = '';
      convHeader.appendChild(agentBadge(conv));
      const model = input.model || '(model)';
      // Model pill
      convHeader.appendChild(pill(model, 'Model Name', null, 'badge'));
      // Max Tokens pill
      if (typeof input.max_tokens === 'number') {
        convHeader.appendChild(pill(`max_tokens:${input.max_tokens}`, 'Max Tokens', null, 'badge'));
      }
      // Temperature pill
      if (typeof input.temperature === 'number') {
        convHeader.appendChild(pill(`temp:${input.temperature}`, 'Temperature', null, 'badge'));
      }

      const extras = ['system', 'messages', 'tools', 'model', 'max_tokens', 'temperature', 'metadata', 'stream', 'betas', 'tool_choice'];
      const inputClone = JSON.parse(JSON.stringify(input || {}));
      extras.forEach(k => delete inputClone[k]);
      const remains = Object.keys(inputClone || {});

      // System (collapsed by default): system prompt + allowed tools
      const hasSystem = Array.isArray(input.system) && input.system.length;
      const hasTools = Array.isArray(input.tools) && input.tools.length;
      if (hasSystem || hasTools || remains.length) {
        const details = document.createElement('details');
        details.className = 'system-info-card';
        const summary = document.createElement('summary');
        const left = document.createElement('span');
        left.className = 'summary-title';
        left.innerHTML = '<span class="summary-main"><span class="summary-name">System</span></span>';
        const right = document.createElement('span');
        right.className = 'badge';
        const toolCount = hasTools ? input.tools.length : 0;
        right.textContent = `${hasSystem ? '1 prompt' : '0 prompts'} · ${toolCount} tools`;
        summary.appendChild(left);
        summary.appendChild(right);
        details.appendChild(summary);

        const body = document.createElement('div');
        body.className = 'small';
        body.style.padding = '10px 12px 12px';

        if (hasSystem) {
          const systemTitle = document.createElement('div');
          systemTitle.className = 'section-title';
          systemTitle.textContent = 'System Prompt';
          body.appendChild(systemTitle);

          const wrap = document.createElement('div'); wrap.className = 'chips';
          input.system.forEach(seg => {
            if (typeof seg === 'string' && isPromptId(seg)) {
              wrap.appendChild(promptRefPill(seg));
            }
            else if (seg?.type === 'text' && isPromptId(seg.text)) {
              wrap.appendChild(promptRefPill(seg.text, seg.cache_control));
            }
            else {
              const box = document.createElement('div'); box.className = 'bubble small';
              const t = typeof seg === 'string' ? seg : (seg?.text ?? pretty(seg));
              box.appendChild(mdBlock(t));
              if (seg?.cache_control) {
                const cacheBadge = document.createElement('span');
                cacheBadge.className = 'badge';
                cacheBadge.textContent = `♻️ ${seg.cache_control.type || 'cached'}`;
                cacheBadge.style.marginLeft = '8px';
                cacheBadge.title = `Cache Control: ${JSON.stringify(seg.cache_control)}`;
                box.appendChild(cacheBadge);
              }
              wrap.appendChild(box);
            }
          });
          body.appendChild(wrap);
        }

        if (hasTools) {
          const toolsTitle = document.createElement('div');
          toolsTitle.className = 'section-title';
          toolsTitle.textContent = 'Tools';
          body.appendChild(toolsTitle);

          const wrap = document.createElement('div'); wrap.className = 'chips';
          input.tools.forEach(nameOrKey => wrap.appendChild(toolRefPill(nameOrKey)));
          body.appendChild(wrap);
        }

        if (remains.length) {
          const extrasTitle = document.createElement('div');
          extrasTitle.className = 'section-title';
          extrasTitle.textContent = 'Other Input Fields';
          body.appendChild(extrasTitle);
          body.appendChild(codeBlock(pretty(inputClone)));
        }

        details.appendChild(body);
        inputPanel.appendChild(details);
      }

      // Messages
      const msgs = Array.isArray(input.messages) ? input.messages : [];
      if (msgs.length) {
        const sec = document.createElement('div'); sec.className = 'small messages-section';
        const title = document.createElement('div');
        title.className = 'section-title messages-title';
        const label = document.createElement('span');
        label.textContent = 'Messages';
        const actions = document.createElement('span');
        actions.className = 'message-actions';
        const expandBtn = document.createElement('button');
        expandBtn.type = 'button';
        expandBtn.className = 'message-toggle-btn';
        expandBtn.textContent = 'Expand all';
        const collapseBtn = document.createElement('button');
        collapseBtn.type = 'button';
        collapseBtn.className = 'message-toggle-btn';
        collapseBtn.textContent = 'Collapse all';
        actions.appendChild(expandBtn);
        actions.appendChild(collapseBtn);
        title.appendChild(label);
        title.appendChild(actions);

        const list = document.createElement('div');
        list.className = 'messages-scroll';
        list.appendChild(renderMessageTree(msgs));
        expandBtn.addEventListener('click', () => {
          list.querySelectorAll('details.message-tree-group').forEach(item => { item.open = true; });
        });
        collapseBtn.addEventListener('click', () => {
          list.querySelectorAll('details.message-tree-group').forEach(item => { item.open = false; });
        });
        sec.appendChild(title);
        sec.appendChild(list);
        inputPanel.appendChild(sec);
      }

    }

    function renderOutput(conv) {
      outputPanel.innerHTML = '';
      outputHeader.innerHTML = ''; // Clear header
      outputHeader.appendChild(agentBadge(conv));

      const result = conv.result || {};
      const type = result.type || '';
      const data = result.data || {};

      // Render Meta Info to Header
      if (data?.usage) {
        const u = data.usage;
        // Token usage pill - click to show full usage details
        const usagePill = pill('token_usage', 'Click to view full usage details');
        usagePill.onclick = () => {
          const wrap = document.createElement('div');
          wrap.appendChild(codeBlock(pretty(u)));
          openModal('Token Usage', wrap);
        };
        outputHeader.appendChild(usagePill);
      }

      // Extract thinking and text content separately
      const contentParts = extractContentParts(data);
      const hasThinking = contentParts.thinking.length > 0;
      const hasText = contentParts.texts.length > 0;

      // Render thinking blocks (if any)
      if (hasThinking) {
        contentParts.thinking.forEach(thinkingText => {
          const thinkingBlock = document.createElement('div');
          thinkingBlock.className = 'thinking-block';
          const thinkingContent = document.createElement('div');
          thinkingContent.className = 'thinking-content';
          thinkingContent.appendChild(mdBlock(thinkingText));
          thinkingBlock.appendChild(thinkingContent);
          outputPanel.appendChild(thinkingBlock);
        });
      }

      // Render response text
      if (hasText) {
        const combinedText = contentParts.texts.join('\n\n');
        
        if (hasThinking) {
          // When thinking is present, use styled response block
          const responseBlock = document.createElement('div');
          responseBlock.className = 'response-block';
          responseBlock.appendChild(mdBlock(combinedText));
          outputPanel.appendChild(responseBlock);
        } else {
          // When no thinking, use simple bubble (original style)
          const bubble = document.createElement('div');
          bubble.className = 'bubble small';
          bubble.appendChild(mdBlock(combinedText));
          outputPanel.appendChild(bubble);
        }
      }

      // tool activity
      if (Array.isArray(data.tools) && data.tools.length) {
        const sec = document.createElement('div'); sec.className = 'small';
        sec.innerHTML = '<div class="section-title">Tool Activity</div>';
        const wrap = document.createElement('div'); wrap.className = 'chips';
        data.tools.forEach(t => {
          const nm = t.name || 'tool';
          // Support both old format (preview as JSON string) and new format (input as object)
          let inputData = null;
          if (t.preview) {
            try { inputData = JSON.parse(t.preview); } catch { inputData = t.preview; }
          } else if (t.input !== undefined) {
            inputData = t.input;
          }
          const p = toolRefPill(nm, inputData);
          // Build title with available info (durationMs only exists in old format)
          const titleParts = [`id:${t.id || '-'}`];
          if (t.durationMs) titleParts.push(`duration:${t.durationMs}ms`);
          p.title = titleParts.join('; ');
          wrap.appendChild(p);
        });
        sec.appendChild(wrap);
        outputPanel.appendChild(sec);
      }

      // other result fields
      const known = ['id', 'type', 'role', 'model', 'content', 'text', 'tools', 'usage', 'stop_reason', 'stop_sequence'];
      const dataClone = JSON.parse(JSON.stringify(data || {}));
      known.forEach(k => delete dataClone[k]);
      if (Object.keys(dataClone).length) {
        const sec = document.createElement('div'); sec.className = 'small';
        sec.innerHTML = '<div class="section-title">Other Result Fields</div>';
        sec.appendChild(codeBlock(pretty(dataClone)));
        outputPanel.appendChild(sec);
      }
    }

    // -------- Navigation --------
    function setIndex(i) {
      const visibleConversations = conversationsForCurrentFilter();
      const total = visibleConversations.length;
      if (total === 0) {
        pageInput.value = 0;
        totalLabel.textContent = ' / 0';
        firstBtn.disabled = true;
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        lastBtn.disabled = true;
        inputPanel.innerHTML = '';
        outputPanel.innerHTML = '';
        convHeader.innerHTML = '';
        outputHeader.innerHTML = '';
        return;
      }
      state.index = Math.max(0, Math.min(i, total - 1));

      firstBtn.disabled = state.index <= 0;
      prevBtn.disabled = state.index <= 0;
      nextBtn.disabled = state.index >= total - 1;
      lastBtn.disabled = state.index >= total - 1;

      pageInput.value = state.index + 1;
      totalLabel.textContent = ` / ${total}`;

      const conv = visibleConversations[state.index];
      renderInput(conv);
      renderOutput(conv);
      saveCurrentLogIndex();
    }

    firstBtn.onclick = () => setIndex(0);
    prevBtn.onclick = () => setIndex(state.index - 1);
    nextBtn.onclick = () => setIndex(state.index + 1);
    lastBtn.onclick = () => setIndex(conversationsForCurrentFilter().length - 1);

    pageInput.addEventListener('change', () => {
      let val = parseInt(pageInput.value, 10);
      if (isNaN(val)) val = 1;
      setIndex(val - 1);
    });
    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') pageInput.blur();
    });
    document.addEventListener('keydown', (e) => {
      if (!state.data) return;
      if (e.key === 'ArrowLeft') prevBtn.click();
      if (e.key === 'ArrowRight') nextBtn.click();
    });

    // -------- Load log files list --------
    const SELECT_FILE_VALUE = '__select_file__';
    const LOCAL_FILE_PREFIX = '__local_file__:';
    const SELECTED_LOG_KEY = 'selectedLog';
    const LOG_INDEX_KEY_PREFIX = 'selectedLogIndex:';

    function isLocalFileValue(value) {
      return typeof value === 'string' && value.startsWith(LOCAL_FILE_PREFIX);
    }

    function localFileValue(fileName) {
      return `${LOCAL_FILE_PREFIX}${encodeURIComponent(fileName)}`;
    }

    function addLocalFileOption(fileName, text) {
      const value = localFileValue(fileName);
      state.localFiles.set(value, {
        name: fileName,
        text,
        mtime: Date.now()
      });

      const existing = Array.from(logSelect.options).find(opt => opt.value === value);
      if (existing) {
        existing.textContent = fileName;
        existing.dataset.source = 'local';
        return value;
      }

      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = fileName;
      opt.dataset.source = 'local';
      logSelect.appendChild(opt);
      return value;
    }

    function logIndexKey(url) {
      return `${LOG_INDEX_KEY_PREFIX}${url}`;
    }

    function readStoredIndex(url) {
      if (!url) return null;
      try {
        const value = localStorage.getItem(logIndexKey(url));
        if (value == null) return null;
        const index = parseInt(value, 10);
        return Number.isFinite(index) && index >= 0 ? index : null;
      } catch (e) {
        console.warn('[Visualizer] Failed to read saved request index:', e);
        return null;
      }
    }

    function saveSelectedLog(url) {
      if (!url || url === SELECT_FILE_VALUE) return;
      try {
        localStorage.setItem(SELECTED_LOG_KEY, url);
      } catch (e) {
        console.warn('[Visualizer] Failed to save selected log:', e);
      }
    }

    function saveCurrentLogIndex() {
      if (!state.currentLogUrl) return;
      try {
        localStorage.setItem(logIndexKey(state.currentLogUrl), String(state.index));
      } catch (e) {
        console.warn('[Visualizer] Failed to save request index:', e);
      }
    }

    function getCurrentLocalFile() {
      return isLocalFileValue(state.currentLogUrl)
        ? state.localFiles.get(state.currentLogUrl)
        : null;
    }

    function currentDownloadInfo() {
      return window.CCLensDownloadCurrentLog.resolveDownloadInfo({
        currentLogUrl: state.currentLogUrl,
        localFile: getCurrentLocalFile()
      });
    }

    function notifyCurrentLogChanged() {
      window.dispatchEvent(new Event('cclens-current-log-change'));
    }

    function triggerDownload(info) {
      if (!info.enabled) return;

      const link = document.createElement('a');
      link.download = info.fileName;

      if (info.kind === 'blob') {
        const blob = new Blob([info.text], { type: 'application/json' });
        const objectUrl = URL.createObjectURL(blob);
        link.href = objectUrl;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(objectUrl);
        return;
      }

      link.href = info.href;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function normalizeLogFiles(logFiles) {
      if (!Array.isArray(logFiles)) return [];

      return logFiles
        .map((file) => {
          if (typeof file === 'string') {
            return { name: file, mtime: 0 };
          }
          return {
            name: file?.name,
            mtime: Number(file?.mtime) || 0
          };
        })
        .filter(file => file.name)
        .sort((a, b) => {
          const diff = b.mtime - a.mtime;
          return diff || a.name.localeCompare(b.name);
        });
    }

    function selectLogPathFromList(logFiles, preferredPath) {
      const fileNames = logFiles.map(file => file.name);
      const preferredFile = preferredPath?.split('/').pop();
      if (preferredFile && fileNames.includes(preferredFile)) {
        return `/logs/${preferredFile}`;
      }

      return fileNames.length > 0 ? `/logs/${fileNames[0]}` : null;
    }

    async function loadLogFiles(options = {}) {
      const {
        preferredPath = null,
        loadSelected = true,
        preservePosition = false
      } = options;

      // Always add "Select file..." option
      logSelect.innerHTML = `<option value="${SELECT_FILE_VALUE}">Select file...</option>`;

      let logFiles = [];
      try {
        // Attempt to fetch list of logs from the server API
        const res = await fetch('/api/logs');
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.logs)) {
            logFiles = data.logs;
          }
        }
      } catch (e) {
        console.warn('Failed to fetch /api/logs', e);
      }

      const normalizedLogs = normalizeLogFiles(logFiles);

      // Populate dropdown
      normalizedLogs.forEach(file => {
        const opt = document.createElement('option');
        opt.value = `/logs/${file.name}`;
        opt.textContent = file.name;
        opt.dataset.mtime = String(file.mtime);
        logSelect.appendChild(opt);
      });

      Array.from(state.localFiles.entries())
        .sort(([, a], [, b]) => b.mtime - a.mtime || a.name.localeCompare(b.name))
        .forEach(([value, file]) => {
          const opt = document.createElement('option');
          opt.value = value;
          opt.textContent = file.name;
          opt.dataset.source = 'local';
          logSelect.appendChild(opt);
        });

      // Try to restore previous selection from localStorage
      let targetPath = null;
      if (preferredPath) {
        targetPath = selectLogPathFromList(normalizedLogs, preferredPath);
      } else {
        try {
          const savedLog = localStorage.getItem(SELECTED_LOG_KEY);
          if (savedLog && savedLog !== '__file_input__') {
            targetPath = selectLogPathFromList(normalizedLogs, savedLog);
            if (targetPath) {
              console.log('[Visualizer] Restored selection from localStorage:', targetPath.split('/').pop());
            } else {
              localStorage.removeItem(SELECTED_LOG_KEY);
              console.log('[Visualizer] Saved log file not found, cleared localStorage');
            }
          }
        } catch (e) {
          console.warn('[Visualizer] localStorage not available:', e);
        }
      }

      // Fallback selection logic if no valid saved selection
      if (!targetPath) {
        // Select first file in list (already sorted by mtime desc, so newest file)
        targetPath = selectLogPathFromList(normalizedLogs, null);
      }

      if (targetPath) {
        logSelect.value = targetPath;
        if (loadSelected) {
          await loadLogFile(targetPath, preservePosition);
        }
      }

      return {
        selectedPath: targetPath,
        logs: normalizedLogs
      };
    }

    function normalizeLoadOptions(optionsOrPreserve = false) {
      return window.CCLensReloadPosition.normalizeLoadOptions(optionsOrPreserve);
    }

    function resolveTargetIndex(url, total, options, previousIndex, previousTotal) {
      return window.CCLensReloadPosition.resolveTargetIndex({
        total,
        options,
        previousIndex,
        previousTotal,
        storedIndex: readStoredIndex(url)
      });
    }

    async function loadLogFile(url, optionsOrPreserve = false) {
      if (!url) return;
      const options = normalizeLoadOptions(optionsOrPreserve);
      if (isLocalFileValue(url)) {
        return loadLocalLogFile(url, options);
      }

      // Remember current position if preserving the already selected file.
      const previousIndex = options.preservePosition && state.currentLogUrl === url ? state.index : null;
      const previousTotal = previousIndex !== null ? (state.data?.conversations || []).length : null;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();
        const filename = url.split('/').pop();
        fileNameEl.textContent = filename;

        if (typeof window.parseConversationLog !== 'function') {
          throw new Error('parser.js is missing parseConversationLog(logString)');
        }

        const json = window.parseConversationLog(text);
        console.log(json);

        state.agentFilter = 'all';
        applyLeadSubagentView(json, await fetchLeadSubagentView(url));
        state.data = json;
        buildMaps(json);
        renderResources();
        renderLeadSubagentFilter();

        const total = (json.conversations || []).length;
        metaInfoEl.textContent = '';

        state.currentLogUrl = url;
        saveSelectedLog(url);
        notifyCurrentLogChanged();

        // Live reload follows the newest request only when the user was already at the newest request.
        const targetIndex = resolveTargetIndex(url, total, options, previousIndex, previousTotal);
        setIndex(targetIndex);
      } catch (err) {
        console.error('Failed to load log file:', err);
        alert(`Failed to load log: ${err.message}`);
      }
    }

    async function loadLocalLogFile(value, optionsOrPreserve = false) {
      const options = normalizeLoadOptions(optionsOrPreserve);
      const file = state.localFiles.get(value);
      if (!file) {
        alert('Local file is no longer available. Please select it again.');
        return;
      }

      const previousIndex = options.preservePosition && state.currentLogUrl === value ? state.index : null;
      const previousTotal = previousIndex !== null ? (state.data?.conversations || []).length : null;

      try {
        if (typeof window.parseConversationLog !== 'function') {
          throw new Error('parser.js is missing parseConversationLog(logString)');
        }

        const json = window.parseConversationLog(file.text);
        fileNameEl.textContent = file.name;
        state.agentFilter = 'all';
        applyLeadSubagentView(json, emptyLeadSubagentView('local-file'));
        state.data = json;
        buildMaps(json);
        renderResources();
        renderLeadSubagentFilter();

        const total = (json.conversations || []).length;
        metaInfoEl.textContent = '';

        state.currentLogUrl = value;
        notifyCurrentLogChanged();
        const targetIndex = resolveTargetIndex(value, total, options, previousIndex, previousTotal);
        setIndex(targetIndex);
      } catch (err) {
        console.error('Failed to load local log file:', err);
        alert(`Failed to load local log: ${err.message}`);
      }
    }

    // -------- SSE for real-time log updates --------
    let sseEventSource = null;
    let sseReconnectTimeout = null;

    function connectSSE() {
      // Don't connect if already connected
      if (sseEventSource && sseEventSource.readyState !== EventSource.CLOSED) {
        return;
      }

      console.log('[SSE] Connecting to /api/log-events...');
      sseEventSource = new EventSource('/api/log-events');

      sseEventSource.onopen = () => {
        console.log('[SSE] Connected');
        // Clear any pending reconnect
        if (sseReconnectTimeout) {
          clearTimeout(sseReconnectTimeout);
          sseReconnectTimeout = null;
        }
      };

      sseEventSource.onmessage = async (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log('[SSE] Event received:', data);

          if (data.type === 'connected') {
            console.log('[SSE] Server confirmed connection');
            return;
          }

          if (data.type === 'change' || data.type === 'rename') {
            const currentFile = logSelect.value?.split('/').pop();
            const updatedFile = data.file;
            const newPath = `/logs/${updatedFile}`;
            
            if (updatedFile === currentFile) {
              // Current file was updated. Follow latest only if the user was already reading latest.
              console.log('[SSE] Current file updated, reloading with smart latest-follow behavior...');
              await loadLogFiles({
                preferredPath: logSelect.value,
                loadSelected: false
              });
              logSelect.value = newPath;
              await loadLogFile(newPath, { preservePosition: true });
            } else {
              // A different file was updated, switch to it and keep the file list sorted by mtime
              console.log('[SSE] Switching to updated file:', updatedFile);
              const result = await loadLogFiles({
                preferredPath: newPath,
                loadSelected: false
              });

              if (result.selectedPath !== newPath) {
                console.warn('[SSE] Updated file is not available in the log list:', updatedFile);
                return;
              }
              
              // Save to localStorage
              try {
                localStorage.setItem(SELECTED_LOG_KEY, newPath);
              } catch (e) {
                console.warn('[SSE] Failed to save to localStorage:', e);
              }
              
              // Load the updated file at its newest request.
              await loadLogFile(newPath, { preferLatest: true });
            }
          }
        } catch (err) {
          console.warn('[SSE] Failed to parse event:', err);
        }
      };

      sseEventSource.onerror = (err) => {
        console.warn('[SSE] Connection error:', err);
        sseEventSource.close();
        
        // Reconnect after 3 seconds
        if (!sseReconnectTimeout) {
          sseReconnectTimeout = setTimeout(() => {
            console.log('[SSE] Attempting to reconnect...');
            sseReconnectTimeout = null;
            connectSSE();
          }, 3000);
        }
      };
    }

    document.addEventListener('DOMContentLoaded', () => {

    function showRailHoverTooltip(trigger) {
      if (!railHoverTooltip || !trigger) return;
      const source = trigger.querySelector('.rail-tooltip');
      const text = source?.textContent?.trim() || trigger.getAttribute('aria-label') || trigger.title;
      if (!text) return;

      const rect = trigger.getBoundingClientRect();
      const opensRight = Boolean(trigger.closest('.rail-left'));
      const x = opensRight ? rect.right + 8 : rect.left - 8;
      const transformHidden = opensRight
        ? 'translate(0, -50%) translateX(-4px)'
        : 'translate(-100%, -50%) translateX(4px)';
      const transformVisible = opensRight
        ? 'translate(0, -50%) translateX(0)'
        : 'translate(-100%, -50%) translateX(0)';
      railHoverTooltip.textContent = text;
      railHoverTooltip.style.position = 'fixed';
      railHoverTooltip.style.left = `${Math.max(8, x)}px`;
      railHoverTooltip.style.top = `${rect.top + rect.height / 2}px`;
      railHoverTooltip.style.transform = transformHidden;
      railHoverTooltip.setAttribute('aria-hidden', 'false');
      railHoverTooltip.classList.add('visible');
      railHoverTooltip.style.transform = transformVisible;
    }

    function hideRailHoverTooltip() {
      if (!railHoverTooltip) return;
      railHoverTooltip.classList.remove('visible');
      railHoverTooltip.setAttribute('aria-hidden', 'true');
    }

    document.addEventListener('mouseover', event => {
      const trigger = event.target.closest?.('.rail-btn');

    });
    document.addEventListener('mouseout', event => {

      if (trigger && !trigger.contains(event.relatedTarget)) hideRailHoverTooltip();
    });
    document.addEventListener('focusin', event => {
      const trigger = event.target.closest?.('.rail-btn');

    });

      function syncRail() {
        const collapsed = isCollapsed();

        railTools.classList.toggle('active', !collapsed && view === 'tools');
        railPrompts.classList.toggle('active', !collapsed && view === 'prompts');
        // Sync counts from existing nav-count spans

          if (state.resourceView !== view) setResourceView(view);
        } else if (state.resourceView === view) {

        } else {
          setResourceView(view);

      railPrompts.addEventListener('click', () => toggleView('prompts'));
      if (closeBtn) closeBtn.addEventListener('click', () => { setResourcesCollapsed(true); syncRail(); });

      new MutationObserver(syncRail).observe(resourcesPanel, { attributes: true, attributeFilter: ['class'] });
      // Watch counts (updated by updateResourceCounts) so badges stay in sync
      new MutationObserver(syncRail).observe(toolsNavCount, { childList: true, characterData: true, subtree: true });
      new MutationObserver(syncRail).observe(promptsNavCount, { childList: true, characterData: true, subtree: true });

    // -------- Resizable columns --------
    (function setupResizableColumns() {
      const ideShell = document.getElementById('ideShell');
      const leftHandle = document.getElementById('leftResizeHandle');
      const rightHandle = document.getElementById('rightResizeHandle');
      if (!ideShell || !leftHandle || !rightHandle) return;

      const MIN_LEFT = 180;
      const MAX_LEFT = 520;
      const MIN_RIGHT = 220;
      const MAX_RIGHT = 620;
      const MIN_CENTER = 420;
      const RAILS_WIDTH = 88;
      const HANDLE_WIDTH = 10;

      function pxVar(name, fallback) {
        const value = getComputedStyle(ideShell).getPropertyValue(name).trim();
        const parsed = parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setPanelWidth(side, width) {
        const prop = side === 'left' ? '--left-w' : '--right-w';
        ideShell.style.setProperty(prop, `${Math.round(width)}px`);
      }

      function maxWidthFor(side) {
        const shellWidth = ideShell.getBoundingClientRect().width;
        const leftWidth = side === 'left' ? 0 : pxVar('--left-w', 280);
        const rightWidth = side === 'right' ? 0 : pxVar('--right-w', 340);
        return Math.max(
          side === 'left' ? MIN_LEFT : MIN_RIGHT,
          shellWidth - RAILS_WIDTH - HANDLE_WIDTH - leftWidth - rightWidth - MIN_CENTER
        );
      }

      function beginResize(side, event) {
        if (event.button !== 0) return;
        event.preventDefault();

        const handle = side === 'left' ? leftHandle : rightHandle;
        const startX = event.clientX;
        const startLeft = pxVar('--left-w', 280);
        const startRight = pxVar('--right-w', 340);

        handle.classList.add('dragging');
        document.body.classList.add('resizing-layout');
        handle.setPointerCapture?.(event.pointerId);

        function onMove(moveEvent) {
          const delta = moveEvent.clientX - startX;
          if (side === 'left') {
            const max = Math.min(MAX_LEFT, maxWidthFor('left'));
            setPanelWidth('left', clamp(startLeft + delta, MIN_LEFT, max));
          } else {
            const max = Math.min(MAX_RIGHT, maxWidthFor('right'));
            setPanelWidth('right', clamp(startRight - delta, MIN_RIGHT, max));
          }
        }

        function onUp(upEvent) {
          handle.classList.remove('dragging');
          document.body.classList.remove('resizing-layout');
          handle.releasePointerCapture?.(upEvent.pointerId);
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onUp);
        }

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
      }

      leftHandle.addEventListener('pointerdown', (event) => beginResize('left', event));
      rightHandle.addEventListener('pointerdown', (event) => beginResize('right', event));
    })();
  </script>
</body>

</html>
